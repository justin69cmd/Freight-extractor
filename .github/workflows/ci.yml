name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Test against the slim local-mode stack (SQLite + local embeddings) —
      # no Postgres/Redis/OCR/torch needed, so CI is fast and deterministic.
      FREIGHT_DATABASE_URL: "sqlite:///./ci.db"
      FREIGHT_EMBEDDING_PROVIDER: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -r requirements-local.txt pytest ruff httpx
      - name: Lint
        run: ruff check app --exit-zero    # report style nits without failing CI
      - name: Test
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build      # next build also type-checks
