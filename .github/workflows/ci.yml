name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: freight
          POSTGRES_PASSWORD: freight
          POSTGRES_DB: freight
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U freight"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
    env:
      FREIGHT_DATABASE_URL: postgresql+psycopg://freight:freight@localhost:5432/freight
      FREIGHT_REDIS_URL: redis://localhost:6379/0
      FREIGHT_EMBEDDING_PROVIDER: local   # deterministic, no external key in CI
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps (Camelot/OpenCV)
        run: sudo apt-get update && sudo apt-get install -y ghostscript libgl1
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app
      - name: Bootstrap DB
        run: python -m scripts.init_db
      - name: Test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
