# Dev/staging stack. Production uses K8s/ECS with autoscaled workers — see
# docs/deployment.md (§19). Startup is ordered via healthchecks so the API and
# workers never race the database.

# In-network service hostnames override the .env defaults (which use localhost
# for bare-metal dev). `environment` takes precedence over `env_file` in compose.
x-backend-net: &backend-net
  FREIGHT_DATABASE_URL: postgresql+psycopg://freight:freight@db:5432/freight
  FREIGHT_REDIS_URL: redis://redis:6379/0

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: freight
      POSTGRES_DB: freight
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: create the pgvector extension + tables, then exit. The API/worker
  # wait for this to complete successfully before starting.
  migrate:
    build: ../backend
    command: python -m scripts.init_db
    env_file: ../backend/.env
    environment: *backend-net
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: ../backend/.env
    environment: *backend-net
    # Shared with the worker: the API saves the uploaded PDF, the worker reads it.
    # In production this is S3/MinIO (FREIGHT_STORAGE_BACKEND=s3); locally a volume.
    volumes: ["appstorage:/app/_storage"]
    ports: ["8000:8000"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 4s
      retries: 6

  worker:
    build: ../backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    env_file: ../backend/.env
    environment: *backend-net
    volumes: ["appstorage:/app/_storage"]   # shared with api (see note above)
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      args:
        BACKEND_URL: http://api:8000   # baked into next build rewrites
    environment:
      BACKEND_URL: http://api:8000
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  appstorage:   # uploaded PDFs + generated xlsx, shared between api and worker
